{% extends "base.html" %}

{% block content %}
<section class="card form-card">
    <h2>Registro de doação</h2>
    <p>Informe como deseja apoiar o projeto.</p>

    <form method="POST">
        <label>Nome *</label>
        <input type="text" name="nome" required>

        <label>Contato *</label>
        <input type="text" name="contato" placeholder="Telefone, e-mail ou WhatsApp" required>

        <label>Tipo de doação *</label>
        <select name="tipo_doacao" required>
            <option value="">Selecione</option>
            <option value="Itens de higiene">Itens de higiene</option>
            <option value="Serviço voluntário">Serviço voluntário</option>
            <option value="Apoio financeiro">Apoio financeiro</option>
            <option value="Outro">Outro</option>
        </select>

        <label>Descrição *</label>
        <textarea name="descricao" rows="4" placeholder="Descreva o que deseja doar" required></textarea>

        <button type="submit" class="btn">Registrar doação</button>
    </form>

    <div class="pix-box">
        <h3>PIX do projeto</h3>
        <p><strong>Chave PIX:</strong> exemplo@instituto.org</p>
        <p>Na R02, isso pode virar integração real com comprovante e painel de acompanhamento.</p>
    </div>
</section>
{% endblock %}
