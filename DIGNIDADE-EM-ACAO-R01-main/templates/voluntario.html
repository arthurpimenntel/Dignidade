{% extends "base.html" %}

{% block content %}
<section class="card form-card">
    <h2>Cadastro de voluntário</h2>
    <p>Preencha os dados abaixo para participar das ações do projeto.</p>

    <form method="POST">
        <label>Nome completo *</label>
        <input type="text" name="nome" required>

        <label>Telefone / WhatsApp *</label>
        <input type="text" name="telefone" required>

        <label>E-mail</label>
        <input type="email" name="email">

        <label>Como deseja ajudar? *</label>
        <select name="tipo_ajuda" required>
            <option value="">Selecione</option>
            <option value="Corte de cabelo">Corte de cabelo</option>
            <option value="Montagem de kits">Montagem de kits</option>
            <option value="Acolhimento / conversa">Acolhimento / conversa</option>
            <option value="Apoio geral">Apoio geral</option>
            <option value="Divulgação">Divulgação</option>
        </select>

        <label>Disponibilidade *</label>
        <input type="text" name="disponibilidade" placeholder="Ex.: sábado pela manhã" required>

        <label>Observação</label>
        <textarea name="observacao" rows="4"></textarea>

        <button type="submit" class="btn">Enviar cadastro</button>
    </form>
</section>
{% endblock %}
